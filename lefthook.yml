pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,tsx,json}"
      run: npx biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    typecheck:
      run: npm run compile
    knip:
      run: npm run knip

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
