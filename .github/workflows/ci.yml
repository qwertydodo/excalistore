name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx biome ci .
      - run: npm run compile
      - run: npm test
      - run: npm run knip
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
